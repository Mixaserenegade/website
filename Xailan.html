<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOT YET.</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%; height: 100%;
  background: #000;
  overflow: hidden;
  font-family: 'Courier New', monospace;
}

/* ── MATRIX CANVAS (background) ── */
#matrix {
  position: fixed;
  inset: 0;
  width: 100%; height: 100%;
  z-index: 0;
}

/* ── CRT SCANLINES ── */
#scanlines {
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    rgba(0,0,0,0.22) 0px,
    rgba(0,0,0,0.22) 1px,
    transparent 1px,
    transparent 3px
  );
  pointer-events: none;
  z-index: 2;
}

/* ── CRT VIGNETTE ── */
#vignette {
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse at 50% 50%,
    transparent 40%,
    rgba(0,0,0,0.55) 75%,
    rgba(0,0,0,0.92) 100%
  );
  pointer-events: none;
  z-index: 3;
}

/* ── CRT SCREEN CURVE GLARE ── */
#glare {
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 50% at 50% 0%, rgba(255,255,255,0.025) 0%, transparent 60%);
  pointer-events: none;
  z-index: 4;
}

/* ── FLICKER OVERLAY ── */
#flicker {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 5;
  opacity: 0;
  background: rgba(255,255,255,0.03);
  animation: flicker 0.15s infinite;
}

@keyframes flicker {
  0%   { opacity: 0; }
  2%   { opacity: 1; }
  4%   { opacity: 0; }
  50%  { opacity: 0; }
  52%  { opacity: 0.4; }
  54%  { opacity: 0; }
  100% { opacity: 0; }
}

/* ── HORIZONTAL GLITCH BAR ── */
#glitch-bar {
  position: fixed;
  left: 0; right: 0;
  height: 3px;
  background: rgba(200, 170, 80, 0.18);
  pointer-events: none;
  z-index: 6;
  animation: scanBar 8s linear infinite;
}

@keyframes scanBar {
  0%   { top: -3px; opacity: 0; }
  2%   { opacity: 1; }
  98%  { opacity: 0.6; }
  100% { top: 100vh; opacity: 0; }
}

/* ── RGB SHIFT CANVAS ── */
#rgbshift {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 7;
  opacity: 0;
  mix-blend-mode: screen;
}

/* ── CENTER TEXT ── */
#center {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
  pointer-events: none;
}

#text {
  font-family: 'Courier New', monospace;
  font-size: clamp(42px, 8vw, 110px);
  font-weight: 700;
  letter-spacing: 0.18em;
  color: #e8dcc8;
  text-shadow:
    0 0 30px rgba(220, 190, 110, 0.6),
    0 0 80px rgba(180, 140, 60, 0.25);
  animation: textFlicker 6s infinite, rgbText 0.08s infinite;
  position: relative;
  user-select: none;
}

@keyframes textFlicker {
  0%,100% { opacity: 1; }
  41%  { opacity: 1; }
  42%  { opacity: 0.6; }
  43%  { opacity: 1; }
  61%  { opacity: 1; }
  62%  { opacity: 0.4; }
  63%  { opacity: 0.9; }
  64%  { opacity: 1; }
  91%  { opacity: 1; }
  92%  { opacity: 0.7; }
  93%  { opacity: 1; }
}

@keyframes rgbText {
  0%, 85%, 100% { text-shadow: 0 0 30px rgba(220,190,110,0.6), 0 0 80px rgba(180,140,60,0.25); }
  86% { text-shadow: -2px 0 rgba(255,60,60,0.5), 2px 0 rgba(60,255,60,0.5), 0 0 30px rgba(220,190,110,0.6); }
  87% { text-shadow: 2px 0 rgba(255,60,60,0.5), -2px 0 rgba(60,60,255,0.5), 0 0 30px rgba(220,190,110,0.6); }
  88% { text-shadow: 0 0 30px rgba(220,190,110,0.6), 0 0 80px rgba(180,140,60,0.25); }
}
</style>
</head>
<body>

<canvas id="matrix"></canvas>
<div id="scanlines"></div>
<div id="vignette"></div>
<div id="glare"></div>
<div id="flicker"></div>
<div id="glitch-bar"></div>

<div id="center">
  <span id="text">NOT YET.</span>
</div>

<script>
// ── GREEK MATRIX RAIN ──
const canvas = document.getElementById('matrix');
const ctx    = canvas.getContext('2d');

const CHARS = 'ΑΒΓΔΕΖΗΘΙΚΛΜΝΞΟΠΡΣΤΥΦΧΨΩαβγδεζηθικλμνξοπρστυφχψωϙϛϜϝΩΨΦ';

let drops = [], speeds = [], fontSize;

function init() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  fontSize = Math.max(11, Math.floor(window.innerHeight / 40));
  const cols = Math.floor(canvas.width / (fontSize * 0.7));
  drops  = Array.from({ length: cols }, () => Math.random() * -(canvas.height / fontSize));
  speeds = Array.from({ length: cols }, () => 0.25 + Math.random() * 0.55);
}

init();
window.addEventListener('resize', init);

function drawMatrix() {
  ctx.fillStyle = 'rgba(0,0,0,0.13)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const cw = canvas.width / drops.length;

  for (let i = 0; i < drops.length; i++) {
    const ch = CHARS[Math.floor(Math.random() * CHARS.length)];
    const x  = i * cw + cw / 2;
    const y  = drops[i] * fontSize;

    // head — bright
    ctx.fillStyle = Math.random() < 0.08 ? '#fff8e8' : '#c8a050';
    ctx.font = `${fontSize}px 'Courier New', monospace`;
    ctx.textAlign = 'center';
    ctx.fillText(ch, x, y);

    drops[i] += speeds[i];

    if (y > canvas.height && Math.random() > 0.977) {
      drops[i]  = Math.random() * -30;
      speeds[i] = 0.25 + Math.random() * 0.55;
    }
  }
}

setInterval(drawMatrix, 42);


// ── RANDOM GLITCH BARS ──
(function glitchLoop() {
  const delay = 2000 + Math.random() * 5000;
  setTimeout(() => {
    const bar     = document.getElementById('glitch-bar');
    const randomY = Math.random() * 100;
    bar.style.top     = randomY + 'vh';
    bar.style.height  = (1 + Math.random() * 4) + 'px';
    bar.style.opacity = (0.1 + Math.random() * 0.3).toString();
    glitchLoop();
  }, delay);
})();


// ── HORIZONTAL SCREEN TEAR ──
(function tearLoop() {
  const delay = 4000 + Math.random() * 8000;
  setTimeout(() => {
    const y  = Math.floor(Math.random() * window.innerHeight);
    const h  = Math.floor(2 + Math.random() * 6);
    const dx = Math.floor(-12 + Math.random() * 24);
    ctx.save();
    const slice = ctx.getImageData(0, y, canvas.width, h);
    ctx.putImageData(slice, dx, y);
    ctx.restore();
    tearLoop();
  }, delay);
})();
</script>
</body>
</html>
